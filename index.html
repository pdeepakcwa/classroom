<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<title>Classroom P2P</title>

<link rel="stylesheet" href="css/styles.css">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

</head>

<body>

<!-- ========================================= -->
<!-- TOP BAR                                   -->
<!-- ========================================= -->

<header class="topbar">

    <div class="logo">
        📚 Classroom P2P
    </div>

    <div class="room-info">

        <span id="modeBadge">
            Offline
        </span>

        <span id="roomId">
            Not Connected
        </span>

    </div>

</header>


<!-- ========================================= -->
<!-- MAIN LAYOUT                               -->
<!-- ========================================= -->

<div class="main-layout">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <button id="teacherBtn"
                class="menu-btn">
            Teacher Mode
        </button>

        <button id="studentBtn"
                class="menu-btn">
            Student Mode
        </button>

        <hr>

        <button id="drawBtn"
                class="menu-btn">
            ✏ Draw
        </button>

        <button id="selectBtn"
                class="menu-btn">
            🖱 Select
        </button>

        <button id="undoBtn"
                class="menu-btn">
            ↶ Undo
        </button>

        <button id="redoBtn"
                class="menu-btn">
            ↷ Redo
        </button>

        <hr>

        <button id="newPageBtn"
                class="menu-btn">
            📒 New Page
        </button>

        <button id="prevPageBtn"
                class="menu-btn">
            ◀ Prev
        </button>

        <button id="nextPageBtn"
                class="menu-btn">
            Next ▶
        </button>

        <div class="page-display">
            Page:
            <span id="pageNumber">
                1
            </span>
        </div>

        <hr>

        <label class="menu-btn file-btn">
            📄 PDF Upload
            <input type="file"
                   id="pdfInput"
                   accept=".pdf"
                   hidden>
        </label>

        <hr>

        <button id="videoBtn"
                class="menu-btn">
            🎥 Start Video
        </button>

        <button id="raiseHandBtn"
                class="menu-btn">
            ✋ Raise Hand
        </button>

        <hr>

        <button id="saveBtn"
                class="menu-btn">
            💾 Save Session
        </button>

        <button id="loadBtn"
                class="menu-btn">
            📂 Load Session
        </button>

        <input type="file"
               id="loadFileInput"
               accept=".json"
               hidden>

    </aside>


    <!-- WHITEBOARD AREA -->

    <main class="workspace">

        <div class="canvas-wrapper">

            <canvas id="boardCanvas"></canvas>

        </div>

    </main>

</div>


<!-- ========================================= -->
<!-- MOBILE BOTTOM BAR                         -->
<!-- ========================================= -->

<nav class="mobile-nav">

    <button id="mobileDraw">
        ✏
    </button>

    <button id="mobilePages">
        📒
    </button>

    <button id="mobileVideo">
        🎥
    </button>

    <button id="mobileHand">
        ✋
    </button>

</nav>


<!-- ========================================= -->
<!-- VIDEO PANEL                               -->
<!-- ========================================= -->

<div id="videoPanel"
     class="video-panel hidden">

    <video id="remoteVideo"
           autoplay
           playsinline>
    </video>

    <video id="localVideo"
           autoplay
           playsinline
           muted>
    </video>

    <div class="video-controls">

        <button onclick="toggleMute()">
            🎤
        </button>

        <button onclick="toggleCamera()">
            📷
        </button>

        <button onclick="startScreenShare()">
            🖥
        </button>

        <button onclick="endVideoCall()">
            ❌
        </button>

    </div>

</div>


<!-- ========================================= -->
<!-- CONNECTION MODAL                          -->
<!-- ========================================= -->

<div id="connectModal"
     class="modal">

    <div class="modal-content">

        <h2>
            Classroom Connection
        </h2>

        <button id="hostRoomBtn"
                class="action-btn">
            Host Classroom
        </button>

        <hr>

        <input type="text"
               id="joinRoomInput"
               placeholder="Enter Teacher Room ID">

        <button id="joinRoomBtn"
                class="action-btn">
            Join Classroom
        </button>

    </div>

</div>


<!-- ========================================= -->
<!-- HAND RAISE POPUP                          -->
<!-- ========================================= -->

<div id="handPopup"
     class="hand-popup hidden">

     ✋ Student wants to ask a question

</div>


<!-- ========================================= -->
<!-- STATUS BAR                                -->
<!-- ========================================= -->

<footer class="statusbar">

    <span id="connectionStatus">
        Disconnected
    </span>

    <span id="syncStatus">
        Not Synced
    </span>

</footer>


<!-- ========================================= -->
<!-- MODULES                                   -->
<!-- ========================================= -->

<script src="js/peer.js"></script>
<script src="js/whiteboard.js"></script>
<script src="js/notebook.js"></script>
<script src="js/video.js"></script>
<script src="js/pdf.js"></script>
<script src="js/app.js"></script>

</body>
</html>
